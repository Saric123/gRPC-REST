syntax = "proto3";

option java_multiple_files = true;
option java_package = "gRPC.on.REST.client.side";

package REST.client;

service Reading {
  rpc RequestReading (Message) returns (Message) {}
}

message Message {
  string  temperature = 1;
  string  pressure = 2;
  string humidity = 3;
  string co = 4;
  string no2 = 5;
  string so2 = 6;
}